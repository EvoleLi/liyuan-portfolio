<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" width="1440" height="900">
  <defs>
    <radialGradient id="glowTop" cx="82%" cy="6%" r="58%">
      <stop offset="0%" stop-color="#9a7b33" stop-opacity="0.17"/>
      <stop offset="70%" stop-color="#9a7b33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="8%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#9a7b33" stop-opacity="0.11"/>
      <stop offset="70%" stop-color="#9a7b33" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <circle cx="2" cy="2" r="1.1" fill="#9a7b33" fill-opacity="0.22"/>
    </pattern>
    <mask id="fade">
      <rect width="1440" height="900" fill="black"/>
      <ellipse cx="720" cy="378" rx="893" ry="540" fill="url(#fadeGrad)"/>
    </mask>
    <radialGradient id="fadeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="78%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
    <path id="circuit" d="M 110 740 L 360 740 L 470 640 L 720 640 L 830 520 L 1080 520 L 1190 400 L 1330 400" fill="none"/>
    <linearGradient id="waveStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a7b33" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9a7b33" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9a7b33" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 柔光晕 -->
  <rect width="1440" height="900" fill="url(#glowTop)"/>
  <rect width="1440" height="900" fill="url(#glowBottom)"/>

  <!-- 细金点阵（向边缘淡出） -->
  <rect width="1440" height="900" fill="url(#dots)" mask="url(#fade)" opacity="0.55"/>

  <!-- 电路走线 + 节点 + 流动信号 -->
  <g filter="url(#soft)">
    <use xlink:href="#circuit" stroke="#9a7b33" stroke-opacity="0.20" stroke-width="1.3" fill="none"/>
  </g>
  <g>
    <circle cx="110" cy="740" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="2.4s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="740" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="2.9s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="640" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="3.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="640" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="3.9s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="520" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="520" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="2.9s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="1190" cy="400" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="3.4s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="1330" cy="400" r="4" fill="#9a7b33" fill-opacity="0.55"><animate attributeName="fill-opacity" values="0.25;0.8;0.25" dur="3.9s" begin="2.1s" repeatCount="indefinite"/></circle>
  </g>
  <circle r="3.4" fill="#9a7b33" fill-opacity="0.95">
    <animateMotion dur="7s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#circuit"/>
    </animateMotion>
  </circle>
  <circle r="2.4" fill="#9a7b33" fill-opacity="0.7">
    <animateMotion dur="7s" begin="3.5s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#circuit"/>
    </animateMotion>
  </circle>

  <!-- 示波器正弦波（缓慢横向滚动） -->
  <g opacity="0.5">
    <path d="M -240 560.0 L -228 564.9 L -216 569.4 L -204 572.9 L -192 575.2 L -180 576.0 L -168 575.2 L -156 572.9 L -144 569.4 L -132 564.9 L -120 560.0 L -108 555.1 L -96 550.6 L -84 547.1 L -72 544.8 L -60 544.0 L -48 544.8 L -36 547.1 L -24 550.6 L -12 555.1 L 0 560.0 L 12 564.9 L 24 569.4 L 36 572.9 L 48 575.2 L 60 576.0 L 72 575.2 L 84 572.9 L 96 569.4 L 108 564.9 L 120 560.0 L 132 555.1 L 144 550.6 L 156 547.1 L 168 544.8 L 180 544.0 L 192 544.8 L 204 547.1 L 216 550.6 L 228 555.1 L 240 560.0 L 252 564.9 L 264 569.4 L 276 572.9 L 288 575.2 L 300 576.0 L 312 575.2 L 324 572.9 L 336 569.4 L 348 564.9 L 360 560.0 L 372 555.1 L 384 550.6 L 396 547.1 L 408 544.8 L 420 544.0 L 432 544.8 L 444 547.1 L 456 550.6 L 468 555.1 L 480 560.0 L 492 564.9 L 504 569.4 L 516 572.9 L 528 575.2 L 540 576.0 L 552 575.2 L 564 572.9 L 576 569.4 L 588 564.9 L 600 560.0 L 612 555.1 L 624 550.6 L 636 547.1 L 648 544.8 L 660 544.0 L 672 544.8 L 684 547.1 L 696 550.6 L 708 555.1 L 720 560.0 L 732 564.9 L 744 569.4 L 756 572.9 L 768 575.2 L 780 576.0 L 792 575.2 L 804 572.9 L 816 569.4 L 828 564.9 L 840 560.0 L 852 555.1 L 864 550.6 L 876 547.1 L 888 544.8 L 900 544.0 L 912 544.8 L 924 547.1 L 936 550.6 L 948 555.1 L 960 560.0 L 972 564.9 L 984 569.4 L 996 572.9 L 1008 575.2 L 1020 576.0 L 1032 575.2 L 1044 572.9 L 1056 569.4 L 1068 564.9 L 1080 560.0 L 1092 555.1 L 1104 550.6 L 1116 547.1 L 1128 544.8 L 1140 544.0 L 1152 544.8 L 1164 547.1 L 1176 550.6 L 1188 555.1 L 1200 560.0 L 1212 564.9 L 1224 569.4 L 1236 572.9 L 1248 575.2 L 1260 576.0 L 1272 575.2 L 1284 572.9 L 1296 569.4 L 1308 564.9 L 1320 560.0 L 1332 555.1 L 1344 550.6 L 1356 547.1 L 1368 544.8 L 1380 544.0 L 1392 544.8 L 1404 547.1 L 1416 550.6 L 1428 555.1 L 1440 560.0 L 1452 564.9 L 1464 569.4 L 1476 572.9 L 1488 575.2 L 1500 576.0 L 1512 575.2 L 1524 572.9 L 1536 569.4 L 1548 564.9 L 1560 560.0 L 1572 555.1 L 1584 550.6 L 1596 547.1 L 1608 544.8 L 1620 544.0 L 1632 544.8 L 1644 547.1 L 1656 550.6 L 1668 555.1" stroke="url(#waveStroke)" stroke-width="1.6" fill="none">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-240 0" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
